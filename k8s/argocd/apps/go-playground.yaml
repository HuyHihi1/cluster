apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: go-playground
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/HuyHihi1/cluster.git'
    targetRevision: HEAD
    path: k8s/apps/go-playground/overlays/dev
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
